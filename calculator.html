<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Scientific Calculator</title>

<style>
  * {
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  .calculator {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 20px;
    width: 340px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  #display {
    width: 100%;
    height: 70px;
    border: none;
    border-radius: 12px;
    margin-bottom: 15px;
    font-size: 26px;
    padding: 15px;
    text-align: right;
    background: rgba(0,0,0,0.4);
    color: #fff;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }

  button {
    height: 55px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    color: white;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    transition: all 0.2s ease;
  }

  button:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
  }

  button:active {
    transform: scale(0.95);
  }

  .operator {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #000;
  }

  .equal {
    grid-column: span 2;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
  }

  .clear {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
  }

  .function {
    background: linear-gradient(135deg, #43cea2, #185a9d);
  }
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button onclick="clearDisplay()" class="clear">C</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>
    <button onclick="append('/')" class="operator">÷</button>
    <button onclick="append('*')" class="operator">×</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')" class="operator">−</button>
    <button onclick="append('Math.sqrt(')" class="function">√</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')" class="operator">+</button>
    <button onclick="append('**')" class="function">x²</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('Math.log10(')" class="function">log</button>
    <button onclick="append('Math.PI')" class="function">π</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="append('Math.sin(')" class="function">sin</button>
    <button onclick="append('Math.cos(')" class="function">cos</button>
    <button onclick="append('Math.tan(')" class="function">tan</button>

    <button onclick="append('Math.exp(')" class="function">exp</button>
    <button onclick="append('Math.pow(')" class="function">xʸ</button>
    <button onclick="append('Math.E')" class="function">e</button>
    <button onclick="calculate()" class="equal">=</button>
  </div>
</div>

<script>
  function append(value) {
    document.getElementById("display").value += value;
  }

  function clearDisplay() {
    document.getElementById("display").value = "";
  }

  function calculate() {
    try {
      let exp = document.getElementById("display").value;
      document.getElementById("display").value = eval(exp);
    } catch {
      alert("Invalid Expression");
    }
  }
</script>

</body>
</html>
